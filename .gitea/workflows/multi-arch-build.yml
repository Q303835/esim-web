name: Native Distributed Multi-Arch Build

on:
  push:
    tags:
      - 'v*'

jobs:
  # 任务 1：派发给你的日本 x86 服务器
  build-amd64:
    runs-on: amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          tags: |
            q303835/esim-web:${{ github.ref_name }}-amd64
            q303835/esim-web:amd64-latest

  # 任务 2：派发给你的美国 ARM 服务器
  build-arm64:
    runs-on: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          tags: |
            q303835/esim-web:${{ github.ref_name }}-arm64
            q303835/esim-web:arm64-latest

  # 任务 3：合并多架构清单（指定由性能强悍的 ARM 机器接管收尾）
  create-manifest:
    needs: [build-amd64, build-arm64]
    runs-on: arm64
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create and push Multi-Arch manifest
        run: |
          # 1. 创建并推送指定版本号的双架构合并清单
          docker manifest create q303835/esim-web:${{ github.ref_name }} \
            q303835/esim-web:${{ github.ref_name }}-amd64 \
            q303835/esim-web:${{ github.ref_name }}-arm64
          docker manifest push q303835/esim-web:${{ github.ref_name }}
          
          # 2. 创建并推送 latest 的双架构合并清单
          docker manifest create q303835/esim-web:latest \
            q303835/esim-web:amd64-latest \
            q303835/esim-web:arm64-latest
          docker manifest push q303835/esim-web:latest